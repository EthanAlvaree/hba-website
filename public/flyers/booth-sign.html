<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pacific Crest Institute — Booth Sign · Books for Sale</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1f5f6b;
    --navy-deep: #0e3a44;
    --orange: #e08a3c;
    --cream: #f6f4ef;
    --body: #1f2937;
    --muted: #4b5563;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e5e7eb; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--body);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width: 8.5in;
    height: 11in;
    margin: 24px auto;
    background: #fff;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── Brand band (cream, same as flyers) ─── */
  .brand {
    background: var(--cream);
    color: var(--navy-deep);
    padding: 0.26in 0.5in;
    display: flex;
    align-items: center;
    gap: 0.22in;
    border-bottom: 3px solid var(--orange);
  }
  .brand img { height: 0.5in; width: auto; display: block; }
  .brand .word { font-weight: 800; font-size: 16pt; letter-spacing: -0.4px; }
  .brand .word small {
    display: block; font-weight: 600; font-size: 8pt;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--orange);
    margin-top: 1px;
  }

  /* ─── Top section: title + price + titles list ─── */
  .top {
    padding: 0.45in 0.5in 0.3in;
    text-align: center;
  }
  .eyebrow {
    font-weight: 700; font-size: 11pt; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--orange);
  }
  .title {
    margin: 12px 0 0; font-weight: 900; font-size: 62pt;
    letter-spacing: -2px; line-height: 0.92; color: var(--navy-deep);
  }
  .price {
    margin: 16px 0 0; font-weight: 900; font-size: 84pt;
    letter-spacing: -3px; line-height: 1; color: var(--orange);
  }
  .price small {
    font-size: 22pt; font-weight: 700; color: var(--navy-deep);
    letter-spacing: -0.5px; margin-left: 6px; vertical-align: 18px;
  }
  .titles {
    margin: 18px 0 0;
    display: inline-flex; flex-direction: column;
    gap: 6px; text-align: left;
  }
  .titles li {
    list-style: none;
    font-weight: 700; font-size: 14pt; color: var(--navy-deep);
    letter-spacing: -0.2px;
  }
  .titles li::before {
    content: "■"; color: var(--orange); margin-right: 10px;
    font-size: 11pt; vertical-align: 2px;
  }

  /* ─── QR section ─── */
  .qr-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0.5in 0.3in;
  }
  .qr-instruction {
    font-weight: 900; font-size: 22pt;
    letter-spacing: -0.6px; color: var(--navy-deep);
    text-align: center;
  }
  .qr-instruction .accent { color: var(--orange); }
  .qr-frame {
    margin-top: 0.22in;
    width: 4.4in;
    height: 4.4in;
    padding: 0.18in;
    background: #fff;
    border: 4px solid var(--navy-deep);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
  .qr-frame img {
    width: 100%; height: 100%;
    display: block;
    image-rendering: crisp-edges;
    image-rendering: -webkit-optimize-contrast;
  }

  /* ─── Footer band ─── */
  .foot {
    background: var(--navy-deep);
    color: #fff;
    padding: 0.20in 0.5in;
    text-align: center;
    border-top: 3px solid var(--orange);
  }
  .foot .url {
    font-weight: 800; font-size: 13pt;
    letter-spacing: -0.3px; color: var(--orange);
  }
  .foot .sub {
    margin-top: 4px;
    font-weight: 300; font-size: 10pt;
    color: rgba(255,255,255,0.78);
  }

  /* ─── Print rules ─── */
  @page { size: letter; margin: 0; }
  @media print {
    html, body { background: #fff; margin: 0; }
    .page { box-shadow: none; margin: 0; width: 8.5in; height: 11in; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- BRAND -->
  <header class="brand">
    <img src="../images/pci/logo-color.webp" alt="Pacific Crest Institute" />
    <div class="word">
      Pacific Crest Institute
      <small>Floating Island Productions</small>
    </div>
  </header>

  <!-- TITLE + PRICE -->
  <section class="top">
    <div class="eyebrow">Hardcover books for sale</div>
    <h1 class="title">Take a book home.</h1>
    <div class="price">$50<small>each</small></div>
    <ul class="titles">
      <li>Scott Shaw&rsquo;s Sonic Days</li>
      <li>The Shadow Files</li>
    </ul>
  </section>

  <!-- QR -->
  <section class="qr-wrap">
    <p class="qr-instruction">
      Scan to pay with <span class="accent">Zelle</span>
    </p>
    <div class="qr-frame">
      <img src="../images/pci/zelle.webp" alt="Zelle QR code to pay Pacific Crest Institute" />
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="foot">
    <div class="url">pacificcrestinstitute.com</div>
    <div class="sub">Ask any of us — we&rsquo;ll wrap your book at the booth.</div>
  </footer>

</div>

</body>
</html>
